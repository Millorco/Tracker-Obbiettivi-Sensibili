<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GPS Tracker — Accesso</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#1a56db;--primary-hover:#1648c4;--danger:#e02424;--danger-light:#fef2f2;--danger-border:#fca5a5;--border:#e2e8f0;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--surface:#fff;--bg:#f4f6f9}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);font-family:'Inter',sans-serif;min-height:100vh;min-height:-webkit-fill-available;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:24px}
.brand-icon{width:38px;height:38px;background:var(--primary);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.brand-name{font-weight:700;font-size:16px;color:var(--text)}
.brand-sub{font-size:11px;color:var(--text3);margin-top:1px}
h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:5px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:22px}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
input[type=password]{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:11px 13px;border-radius:7px;font-family:'Inter',sans-serif;font-size:16px;outline:none;transition:.15s;-webkit-appearance:none;appearance:none}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.btn{width:100%;background:var(--primary);color:#fff;border:none;padding:12px;border-radius:7px;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:.15s;margin-top:4px}
.btn:hover{background:var(--primary-hover)}
.btn:active{transform:scale(.98)}
.alert{background:var(--danger-light);border:1px solid var(--danger-border);color:var(--danger);padding:10px 13px;border-radius:7px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">🛰️</div>
    <div>
      <div class="brand-name">GPS Tracker</div>
      <div class="brand-sub">Sistema di monitoraggio percorsi</div>
    </div>
  </div>
  <h2>Accedi</h2>
  <p class="subtitle">Inserisci la password per accedere.</p>
  {% with messages = get_flashed_messages() %}
    {% if messages %}<div class="alert">{{ messages[0] }}</div>{% endif %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autofocus required autocomplete="current-password">
    </div>
    <button type="submit" class="btn">Accedi</button>
  </form>
</div>
</body>
</html>
